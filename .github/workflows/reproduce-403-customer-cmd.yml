name: Reproduce 403 - Customer Command Pattern

# Deterministically reproduces the customer's 403 by replicating the TRUE root cause:
#
#   Two plugin executions in the release-snapshot profile both attach an artifact
#   with classifier=javadoc:
#     1. maven-javadoc-plugin (attach-javadocs) → real javadoc jar
#     2. maven-jar-plugin     (empty-javadoc-jar) → empty jar, same classifier
#
#   Maven attaches both to the project. The deploy plugin iterates over all
#   attached artifacts and sends two sequential PUTs to the same remote path:
#     PUT #1 → real javadoc jar  → 201  (ACCEPTED DEPLOY)
#     PUT #2 → empty jar         → 403  (DENIED DELETE — overwrite needs Delete permission)
#
#   This is exactly what Artifactory's access.log shows in the customer's case.
#   -Daether.connector.basic.parallelPut=false has no effect because these are
#   two genuinely separate attached artifacts, not parallel uploads of the same one.
#
# Replicates the customer's exact command:
#   ./mvnw clean deploy -s deployment_settings.xml -V -DskipTests -Prelease-snapshot \
#     -DaltDeploymentRepository=private-repository::https://...snapshot-internal \
#     -DretryFailedDeploymentCount=5

on:
  workflow_dispatch:
    inputs:
      maven_version:
        description: 'Maven version to test (3.9.12 to reproduce, 3.9.10 to compare)'
        required: true
        default: '3.9.12'

env:
  ARTIFACTORY_SNAPSHOT_URL: https://elinaf.jfrog.io/artifactory/edenb-pipeline-libs-snapshot

jobs:
  reproduce-403-customer-cmd:
    name: Deploy via altDeploymentRepository with Maven ${{ github.event.inputs.maven_version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Maven ${{ github.event.inputs.maven_version }}
        run: |
          MVN_VERSION=${{ github.event.inputs.maven_version }}
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz \
            | tar xz -C /opt
          echo "/opt/apache-maven-${MVN_VERSION}/bin" >> $GITHUB_PATH

      - name: Verify Maven version
        run: mvn --version

      # Inflate the javadoc jar from ~122 kB to several MB by generating 300 Java source
      # files with large javadoc blocks. A larger jar means PUT #1 takes longer to complete,
      # increasing the probability that it finishes before PUT #2 starts — the timing
      # condition that causes Artifactory to treat PUT #2 as an overwrite and return 403.
      - name: Pad sources to inflate javadoc jar size
        run: |
          mkdir -p src/main/java/io/jfrog/example/padding
          for i in $(seq 1 300); do
            cat > src/main/java/io/jfrog/example/padding/PaddingClass${i}.java << 'JAVAEOF'
          package io.jfrog.example.padding;
          /**
           * Padding class to inflate the javadoc jar size.
           * Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor
           * incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud
           * exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure
           * dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.
           * Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt
           * mollit anim id est laborum. Sed ut perspiciatis unde omnis iste natus error sit
           * voluptatem accusantium doloremque laudantium totam rem aperiam eaque ipsa quae ab illo.
           */
          public class PaddingClassNUM { public int index() { return NUM; } }
          JAVAEOF
            sed -i "s/NUM/${i}/g" src/main/java/io/jfrog/example/padding/PaddingClass${i}.java
          done
          echo "Generated $(ls src/main/java/io/jfrog/example/padding/ | wc -l) padding classes"

      # Replicates the customer's exact command pattern:
      #   - -Prelease-snapshot activates both javadoc plugin executions (true root cause)
      #   - -DaltDeploymentRepository bypasses distributionManagement (as in the customer's build)
      #   - -DretryFailedDeploymentCount=3 mirrors the customer's retry flag
      #   - deploy-only-test has Deploy but NOT Delete on the snapshot repo
      - name: Deploy SNAPSHOT to Artifactory (customer command pattern)
        run: |
          mvn clean deploy \
            --settings .mvn/settings-deploy-only.xml \
            -V \
            -DskipTests \
            -Prelease-snapshot \
            -DaltDeploymentRepository=snapshots::${{ env.ARTIFACTORY_SNAPSHOT_URL }} \
            -DretryFailedDeploymentCount=3 \
            -Daether.connector.basic.parallelPut=false \
            --batch-mode
        env:
          ARTIFACTORY_USERNAME: edenb
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          DEPLOY_ONLY_USERNAME: deploy-only-test
          DEPLOY_ONLY_PASSWORD: ${{ secrets.ARTIFACTORY_DEPLOY_ONLY_PASSWORD }}

      - name: What to check in Artifactory logs
        if: always()
        run: |
          echo "========================================================"
          echo " Root cause: two plugin executions attach classifier=javadoc"
          echo "   1. maven-javadoc-plugin:attach-javadocs → real javadoc jar"
          echo "   2. maven-jar-plugin:empty-javadoc-jar   → empty jar, same path"
          echo ""
          echo " Check artifactory-request.log for:"
          echo "   PUT .../maven-artifactory-pipeline-*-javadoc.jar | 201  <- real jar"
          echo "   PUT .../maven-artifactory-pipeline-*-javadoc.jar | 403  <- empty jar"
          echo ""
          echo " Check artifactory-access.log for:"
          echo "   [ACCEPTED DEPLOY] ...-javadoc.jar  ← PUT #1 (real javadoc jar)"
          echo "   [DENIED DELETE]   ...-javadoc.jar  ← PUT #2 (empty jar, same path)"
          echo "========================================================"
