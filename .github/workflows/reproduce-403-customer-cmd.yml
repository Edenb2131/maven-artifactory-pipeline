name: Reproduce 403 - Customer Command Pattern

# Replicates the exact command the customer uses:
#
#   ./mvnw clean deploy -s deployment_settings.xml -V -DskipTests -Prelease-snapshot \
#     -DaltDeploymentRepository=private-repository::https://...snapshot-internal \
#     --file path/to/hazelcast-tpc-engine
#
# Key differences from the previous reproduce-403.yml attempt:
#   - Uses -Prelease-snapshot profile to activate javadoc generation
#   - Uses -DaltDeploymentRepository to override the deploy target (not distributionManagement)
#   - Deploys with deploy-only-test user (Deploy but no Delete permission)

on:
  workflow_dispatch:
    inputs:
      maven_version:
        description: 'Maven version to test (3.9.12 to reproduce, 3.9.10 to compare)'
        required: true
        default: '3.9.12'

env:
  ARTIFACTORY_SNAPSHOT_URL: https://elinaf.jfrog.io/artifactory/edenb-pipeline-libs-snapshot

jobs:
  reproduce-403-customer-cmd:
    name: Deploy via altDeploymentRepository with Maven ${{ github.event.inputs.maven_version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Maven ${{ github.event.inputs.maven_version }}
        run: |
          MVN_VERSION=${{ github.event.inputs.maven_version }}
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz \
            | tar xz -C /opt
          echo "/opt/apache-maven-${MVN_VERSION}/bin" >> $GITHUB_PATH

      - name: Verify Maven version
        run: mvn --version

      # Generate 300 dummy Java classes with large javadoc blocks to inflate the
      # javadoc jar from ~122 kB to several MB. This makes the upload take long
      # enough that the second concurrent PUT from Maven 3.9.12 can arrive after
      # the first completes — the timing condition needed to trigger the 403.
      # Files are generated at runtime so the repo stays clean.
      - name: Pad sources to inflate javadoc jar size
        run: |
          mkdir -p src/main/java/io/jfrog/example/padding
          for i in $(seq 1 300); do
            cat > src/main/java/io/jfrog/example/padding/PaddingClass${i}.java << JAVAEOF
          package io.jfrog.example.padding;

          /**
           * Padding class ${i} — exists solely to inflate the javadoc jar size so that
           * the upload takes long enough to expose the Maven 3.9.12 duplicate-PUT race condition.
           *
           * <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor
           * incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud
           * exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure
           * dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.
           * Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt
           * mollit anim id est laborum. Sed ut perspiciatis unde omnis iste natus error sit voluptatem
           * accusantium doloremque laudantium, totam rem aperiam eaque ipsa quae ab illo inventore
           * veritatis et quasi architecto beatae vitae dicta sunt explicabo. Nemo enim ipsam
           * voluptatem quia voluptas sit aspernatur aut odit aut fugit sed quia consequuntur magni
           * dolores eos qui ratione voluptatem sequi nesciunt neque porro quisquam est qui dolorem
           * ipsum quia dolor sit amet consectetur adipisci velit sed quia non numquam eius modi
           * tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem.
           *
           * @see PaddingClass1
           * @since 1.0.0
           */
          public class PaddingClass${i} {

              /**
               * Returns the class index.
               * @return index ${i}
               */
              public int index() { return ${i}; }
          }
          JAVAEOF
          done
          echo "Generated $(ls src/main/java/io/jfrog/example/padding/ | wc -l) padding classes"

      # Replicates the customer's exact command pattern:
      #   - -Prelease-snapshot activates the javadoc plugin (as in the customer's build)
      #   - -DaltDeploymentRepository bypasses distributionManagement (as in the customer's build)
      #   - deploy-only-test has Deploy but NOT Delete on the snapshot repo
      - name: Deploy SNAPSHOT to Artifactory (customer command pattern)
        run: |
          mvn clean deploy \
            --settings .mvn/settings-deploy-only.xml \
            -V \
            -DskipTests \
            -Prelease-snapshot \
            -DaltDeploymentRepository=snapshots::${{ env.ARTIFACTORY_SNAPSHOT_URL }} \
            --batch-mode
        env:
          ARTIFACTORY_USERNAME: edenb
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          DEPLOY_ONLY_USERNAME: deploy-only-test
          DEPLOY_ONLY_PASSWORD: ${{ secrets.ARTIFACTORY_DEPLOY_ONLY_PASSWORD }}

      - name: What to check in Artifactory logs
        if: always()
        run: |
          echo "========================================================"
          echo " Check artifactory-request.log for:"
          echo "   PUT .../maven-artifactory-pipeline-*-javadoc.jar | 201"
          echo "   PUT .../maven-artifactory-pipeline-*-javadoc.jar | 403  <- bug"
          echo ""
          echo " Check artifactory-access.log for:"
          echo "   [ACCEPTED DEPLOY] ...-javadoc.jar"
          echo "   [DENIED DELETE]   ...-javadoc.jar  (same file, ~ms later)"
          echo "========================================================"
