name: Maven Artifactory Pipeline

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 1.0.0). Leave empty for snapshot deployment.'
        required: false
        default: ''

env:
  ARTIFACTORY_URL: https://elinaf.jfrog.io/artifactory
  ARTIFACTORY_USERNAME: edenb

jobs:
  # ─────────────────────────────────────────────
  # Build & Test (runs on every push / PR)
  # ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and run tests
        run: mvn clean verify --settings .mvn/settings.xml --batch-mode
        env:
          ARTIFACTORY_USERNAME: ${{ env.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ─────────────────────────────────────────────
  # Deploy SNAPSHOT  (main branch, no release input)
  # ─────────────────────────────────────────────
  deploy-snapshot:
    name: Deploy Snapshot
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.release_version == '' || github.event.inputs.release_version == null)

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Verify version is a SNAPSHOT
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $VERSION"
          if [[ "$VERSION" != *"-SNAPSHOT" ]]; then
            echo "ERROR: Expected a SNAPSHOT version for this job, got: $VERSION"
            exit 1
          fi

      - name: Deploy snapshot to Artifactory
        run: mvn deploy --settings .mvn/settings.xml --batch-mode -DskipTests
        env:
          ARTIFACTORY_USERNAME: ${{ env.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}

  # ─────────────────────────────────────────────
  # Deploy RELEASE  (manual trigger with version)
  # ─────────────────────────────────────────────
  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.release_version != ''

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: |
          RELEASE_VERSION=${{ github.event.inputs.release_version }}
          echo "Setting version to $RELEASE_VERSION"
          mvn versions:set -DnewVersion=$RELEASE_VERSION --batch-mode
          mvn versions:commit --batch-mode

      - name: Deploy release to Artifactory
        run: mvn deploy --settings .mvn/settings.xml --batch-mode -DskipTests
        env:
          ARTIFACTORY_USERNAME: ${{ env.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Tag release in Git
        run: |
          RELEASE_VERSION=${{ github.event.inputs.release_version }}
          git add pom.xml
          git commit -m "chore: release v${RELEASE_VERSION}"
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
          git push origin HEAD --tags

      - name: Bump to next SNAPSHOT version
        run: |
          RELEASE_VERSION=${{ github.event.inputs.release_version }}
          # Increment the patch segment and append -SNAPSHOT
          NEXT_VERSION=$(echo $RELEASE_VERSION | awk -F. '{print $1"."$2"."$3+1}')
          echo "Bumping to next development version: ${NEXT_VERSION}-SNAPSHOT"
          mvn versions:set -DnewVersion=${NEXT_VERSION}-SNAPSHOT --batch-mode
          mvn versions:commit --batch-mode
          git add pom.xml
          git commit -m "chore: bump to ${NEXT_VERSION}-SNAPSHOT"
          git push origin HEAD
